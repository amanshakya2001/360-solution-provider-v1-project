<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="360 Solution Provider — Technical & educational solutions for engineering students.">
  <title>360 Solution Provider</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- App Shell CSS -->
  <link rel="stylesheet" href="assest/css/index.css">
</head>
<body>

  <!-- ════════════════ TOPBAR ════════════════ -->
  <nav class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <a href="#" class="brand" onclick="navigate('pages/home.html'); return false;">
        <img src="favicon.svg" alt="360 Logo" class="brand-logo">
        <span class="brand-name">360 Solution Provider</span>
      </a>
    </div>
  </nav>

  <!-- ════════════════ SIDEBAR OVERLAY ════════════════ -->
  <div class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- ════════════════ SIDEBAR ════════════════ -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <ul>
        <li>
          <a href="#" class="nav-link active" data-page="pages/home.html"
             onclick="navigate(this.dataset.page); return false;">
            <i class="bi bi-house-door-fill"></i><span>Home</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-page="pages/category.html"
             onclick="navigate(this.dataset.page); return false;">
            <i class="bi bi-grid-3x3-gap-fill"></i><span>Categories</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-page="pages/review.html"
             onclick="navigate(this.dataset.page); return false;">
            <i class="bi bi-star-fill"></i><span>Reviews</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-page="pages/about-us.html"
             onclick="navigate(this.dataset.page); return false;">
            <i class="bi bi-people-fill"></i><span>About Us</span>
          </a>
        </li>
        <li>
          <a href="#" class="nav-link" data-page="pages/help.html"
             onclick="navigate(this.dataset.page); return false;">
            <i class="bi bi-question-circle-fill"></i><span>Help</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <p class="sidebar-follow">Follow us</p>
      <div class="social-links">
        <a href="https://twitter.com/360Sol_Provider" target="_blank" aria-label="Twitter" class="sf-icon-btn">
          <i class="bi bi-twitter-x"></i></a>
        <a href="https://www.linkedin.com/in/solution-provider-210a05222/" target="_blank" aria-label="LinkedIn" class="sf-icon-btn">
          <i class="bi bi-linkedin"></i></a>
        <a href="https://www.instagram.com/360solutionprovider/" target="_blank" aria-label="Instagram" class="sf-icon-btn">
          <i class="bi bi-instagram"></i></a>
      </div>
      <p class="sidebar-version"><span class="version-dot"></span>v2.0 &nbsp;&middot;&nbsp; 360 Solution Provider</p>
    </div>
  </aside>

  <!-- ════════════════ MAIN IFRAME ════════════════ -->
  <main class="main-content">
    <iframe src="pages/home.html" id="frame1" name="frame1" title="Page content"
            onload="onFrameLoad(this)"></iframe>
  </main>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App logic -->
  <script src="assest/js/index.js"></script>
</body>
</html>
