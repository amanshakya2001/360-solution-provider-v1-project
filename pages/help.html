<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Center — 360 Solution Provider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../assest/css/help.css">
</head>
<body>

  <!-- Banner -->
  <div class="help-banner">
    <h1><i class="bi bi-life-preserver me-2"></i>Help Center</h1>
    <p>Find answers to common questions or get in touch with our support team.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search for help topics..."
             oninput="filterFAQ()" onkeydown="if(event.key==='Enter') filterFAQ()">
      <button onclick="filterFAQ()">
        <i class="bi bi-search"></i> Search
      </button>
    </div>
  </div>

  <!-- Support cards -->
  <div class="support-section">
    <div class="container">
      <div class="row g-3">
        <div class="col-sm-4 d-flex">
          <div class="support-card w-100">
            <div class="support-icon icon-info"><i class="bi bi-info-circle-fill"></i></div>
            <h3>General Info</h3>
            <p>Learn how the platform works</p>
          </div>
        </div>
        <div class="col-sm-4 d-flex">
          <div class="support-card w-100">
            <div class="support-icon icon-faq"><i class="bi bi-question-circle-fill"></i></div>
            <h3>FAQs</h3>
            <p>Common questions answered</p>
          </div>
        </div>
        <div class="col-sm-4 d-flex">
          <div class="support-card w-100">
            <div class="support-icon icon-contact"><i class="bi bi-envelope-fill"></i></div>
            <h3>Contact Us</h3>
            <p>support@360solution.com</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FAQ Section -->
  <div class="faq-section">
    <h2 class="faq-title">Frequently Asked Questions</h2>
    <div id="no-results">
      <i class="bi bi-search"></i>
      <p>No results found. Try a different search term.</p>
    </div>
    <div class="accordion" id="faqAccordion"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const faqs = [
      { q: 'What is 360 Solution Provider?',
        a: '360 Solution Provider is a platform that connects engineering students with professionals who solve technical and educational problems across Computer Science, Mechanical Engineering, and Education.' },
      { q: 'How do I submit a query?',
        a: 'Go to the Categories page, choose the service that matches your problem, and click on it. A query form will appear — enter your email and describe your issue, then submit. Our team will contact you within 24–48 hours.' },
      { q: 'Who are the professionals on this platform?',
        a: 'Our team includes software developers, graphic designers, mechanical engineers, and academic professionals. Visit the About Us page to meet the team.' },
      { q: 'Is the platform free to use?',
        a: 'Yes, submitting a query and using all basic features is completely free. Our team evaluates each request and responds with available solutions.' },
      { q: 'How do I create an account?',
        a: 'Click the Login button in the top-right corner, then click "Sign up free". Fill in your email, username, and password to get started.' },
      { q: 'How long does it take to get a response?',
        a: 'Our team typically responds within 24–48 hours. Response time may vary depending on the complexity of the query and team availability.' },
      { q: 'Can I track my query history?',
        a: 'Yes! Once logged in, visit your Profile page to view your query history and account details.' },
      { q: 'What types of services are available?',
        a: 'Computer Services (Software, Web Dev, AI, App Dev, UI/UX, ML), Mechanical Services (3D Design, CAM, VMC), and Educational Services (Primary through Post-Graduation).' },
      { q: 'How do I leave a review?',
        a: 'Navigate to the Reviews page from the sidebar. Select a star rating (1–5 stars), write your comment, and click Submit. Your review will be saved and visible to others immediately.' },
      { q: 'How do I contact support?',
        a: 'Email us at support@360solution.com or follow us on Twitter, LinkedIn, and Instagram for quick responses.' },
    ];

    function renderFAQs(list) {
      const accordion = document.getElementById('faqAccordion');
      const noResults = document.getElementById('no-results');

      if (!list.length) {
        accordion.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }
      noResults.style.display = 'none';

      accordion.innerHTML = list.map((f, i) => `
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button ${i > 0 ? 'collapsed' : ''}"
                    type="button" data-bs-toggle="collapse"
                    data-bs-target="#faq${i}" aria-expanded="${i === 0}">
              ${esc(f.q)}
            </button>
          </h2>
          <div id="faq${i}" class="accordion-collapse collapse ${i === 0 ? 'show' : ''}"
               data-bs-parent="#faqAccordion">
            <div class="accordion-body">${esc(f.a)}</div>
          </div>
        </div>`).join('');
    }

    function filterFAQ() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) { renderFAQs(faqs); return; }
      renderFAQs(faqs.filter(f =>
        f.q.toLowerCase().includes(q) || f.a.toLowerCase().includes(q)
      ));
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    renderFAQs(faqs);
  </script>
</body>
</html>
