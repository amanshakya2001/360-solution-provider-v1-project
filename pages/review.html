<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews — 360 Solution Provider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../assest/css/review.css">
</head>
<body>

  <!-- Page header -->
  <div class="page-header">
    <h1><i class="bi bi-star-fill me-2"></i>Reviews</h1>
    <p>Share your experience and help others discover great solutions.</p>
  </div>

  <div class="container" style="max-width:820px">
    <div class="row g-4 align-items-start">

      <!-- ── Submit form ─────────────────────────────────────── -->
      <div class="col-lg-5">
        <div class="card-panel">
          <h5 style="font-weight:700;margin-bottom:20px">Write a Review</h5>

          <label class="form-label-custom" for="commentInput">Your Comment</label>
          <input type="text" class="form-control-custom" id="commentInput"
                 placeholder="Share your experience...">

          <label class="form-label-custom">Rating</label>
          <div class="star-rating mb-2">
            <input type="radio" id="s5" name="rating" value="5">
            <label for="s5" title="5 stars"></label>
            <input type="radio" id="s4" name="rating" value="4">
            <label for="s4" title="4 stars"></label>
            <input type="radio" id="s3" name="rating" value="3">
            <label for="s3" title="3 stars"></label>
            <input type="radio" id="s2" name="rating" value="2">
            <label for="s2" title="2 stars"></label>
            <input type="radio" id="s1" name="rating" value="1">
            <label for="s1" title="1 star"></label>
          </div>

          <button class="btn-submit mt-3" onclick="submitReview()">
            <i class="bi bi-send-fill"></i> Submit Review
          </button>
        </div>
      </div>

      <!-- ── Review list ─────────────────────────────────────── -->
      <div class="col-lg-7">
        <div class="card-panel">
          <h5 style="font-weight:700;margin-bottom:20px">Recent Reviews</h5>
          <div id="reviewList"></div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function submitReview() {
      const input   = document.getElementById('commentInput');
      const ratingEl = document.querySelector('input[name="rating"]:checked');
      const comment  = input.value.trim();

      input.classList.remove('error');

      if (!comment) {
        input.classList.add('error');
        showToast('Please write a comment first.', 'error');
        input.focus();
        return;
      }
      if (!ratingEl) {
        showToast('Please select a star rating.', 'error');
        return;
      }

      const reviews = JSON.parse(localStorage.getItem('reviews') || '[]');
      reviews.unshift({
        comment, rating: +ratingEl.value,
        user: localStorage.getItem('username') || 'Anonymous',
        date: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      });
      localStorage.setItem('reviews', JSON.stringify(reviews.slice(0, 20)));

      input.value = '';
      ratingEl.checked = false;
      showToast('Thank you! Your review has been published.', 'success');
      renderReviews();
    }

    function renderReviews() {
      const list = document.getElementById('reviewList');
      const reviews = JSON.parse(localStorage.getItem('reviews') || '[]');

      if (!reviews.length) {
        list.innerHTML = `<div class="no-reviews">
          <i class="bi bi-chat-square-heart"></i>
          <p>No reviews yet — be the first!</p>
        </div>`;
        return;
      }

      list.innerHTML = reviews.map(r => {
        const filled = '★'.repeat(r.rating);
        const empty  = '☆'.repeat(5 - r.rating);
        return `<div class="review-item">
          <div class="review-stars">${filled}${empty}</div>
          <div class="review-comment">${esc(r.comment)}</div>
          <div class="review-meta"><i class="bi bi-person-circle me-1"></i>${esc(r.user)} &middot; ${esc(r.date)}</div>
        </div>`;
      }).join('');
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg, type) {
      const c = document.getElementById('toast-container');
      const icons = { success:'bi-check-circle-fill', error:'bi-x-circle-fill' };
      const t = document.createElement('div');
      t.className = `app-toast ${type}`;
      t.innerHTML = `<i class="bi ${icons[type]} toast-icon"></i><span>${msg}</span>`;
      c.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 420); }, 3400);
    }

    renderReviews();
  </script>
</body>
</html>
